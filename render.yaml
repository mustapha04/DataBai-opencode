services:
  - type: web
    name: predictiq-api
    runtime: python
    repo: https://github.com/mustapha04/DataBai-opencode
    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r PredictIQ/backend/requirements.txt
    startCommand: cd PredictIQ/backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://predictiq.vercel.app,http://localhost:5173,http://127.0.0.1:5173
